name = "hf-gpt-image-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# CORS 허용 출처. 보안을 위해 본인 GitHub Pages 주소로 바꾸는 것을 권장.
# 예: "https://philip03-korea.github.io"  ("*" 는 아무 사이트나 허용)
[vars]
ALLOW_ORIGIN = "*"

# Contabo gpt_image_2 백엔드 연결 정보는 wrangler.toml 에 적지 말고 시크릿으로 등록:
#   wrangler secret put CONTABO_URL    (예: https://xxxx.trycloudflare.com)
#   wrangler secret put CONTABO_KEY    (Contabo 백엔드 X-API-Key)
# (이전 HF_KEY_ID/HF_KEY_SECRET 시크릿은 더 이상 안 씀 — 지우려면 wrangler secret delete HF_KEY_ID 등)
